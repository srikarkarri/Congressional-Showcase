<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congressional App Challenge Showcase | Hack Club</title>
  <meta name="description" content="A showcase of apps built by high schoolers for the Congressional App Challenge, powered by Hack Club.">
  <meta property="og:title" content="Congressional App Challenge Showcase">
  <meta property="og:description" content="High schoolers building apps that matter. Browse projects from across the country.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <header class="hero">
    <h1>Congressional App Challenge Showcase</h1>
    <p>High schoolers building apps that matter.</p>
    <p class="subtitle">Click a pin on the map to explore a project</p>
    <div class="hero-actions">
      <a href="https://github.com/hackclub/Congressional-Showcase/blob/main/README.md#add-your-project" class="hero-btn">Add Your Project</a>
      <button id="random-project" class="hero-btn" onclick="goToRandomProject()">View Random Project</button>
    </div>
  </header>

  <section id="map">
    <div id="map-container"></div>
  </section>

  <footer>
    <p>Use <kbd>&larr;</kbd> <kbd>&rarr;</kbd> arrow keys to browse projects. Press <kbd>Esc</kbd> to return here.</p>
    <p>Built with <span style="color: var(--hc-red)">&hearts;</span> by <a href="https://github.com/claynicholson">Clay Nicholson</a></p>
    <p>follow me for a cookie</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="assets/js/map.js"></script>
  <script src="assets/js/nav.js" data-root="./"></script>
  <script>
    function goToRandomProject() {
      fetch('./projects.json')
        .then(function(r) { return r.json(); })
        .then(function(p) {
          if (p.length === 0) return;
          var pick = p[Math.floor(Math.random() * p.length)];
          window.location.href = 'sites/' + pick.slug + '/';
        });
    }
  </script>
</body>
</html>
